<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMRv - Registro de Danos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header">
        <div class="status-bar">
            <span id="view-indicator">VISTA 1/4</span>
            <span id="view-name">VISÃO FRONTAL</span>
        </div>
    </header>

    <main id="app-main">
        <div id="tag-container" class="tag-grid">
            <!-- Tags serão inseridas dinamicamente pelo JS -->
        </div>
    </main>

    <footer id="app-footer">
        <button id="btn-prev" class="btn btn-secondary">VOLTAR</button>
        <button id="btn-next" class="btn btn-primary">PRÓXIMA VISTA</button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
